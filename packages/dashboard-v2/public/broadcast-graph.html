const sizes = {article:8,entity:d=>5+Math.min((d.freq||1)*2,12),topic:5,person:6};

const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("#graph").append("svg").attr("width",W).attr("height",H);
const g = svg.append("g");

// Zoom
svg.call(d3.zoom().scaleExtent([0.3,5]).on("zoom", e => g.attr("transform",e.transform)));

// Map node ids to indices

nodes.forEach((n,i) => nodeMap[n.id] = i);

const validLinks = links.filter(l => nodeMap[l.source]!==undefined && nodeMap[l.target]!==undefined)
    .map(l => ({...l, source:l.source, target:l.target}));

const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(validLinks).id(d=>d.id).distance(d => d.type==="related"?80:50))
    .force("charge", d3.forceManyBody().strength(d => d.type==="article"?-200:-80))
    .force("center", d3.forceCenter(W/2, H/2))
    .force("collision", d3.forceCollide().radius(d => getR(d)+4))
    .force("x", d3.forceX(W/2).strength(0.03))
    .force("y", d3.forceY(H/2).strength(0.03));

function getR(d) {
    if(d.type==="entity") return 5+Math.min((d.freq||1)*2,12);
    return {article:8,topic:5,person:6}[d.type]||5;
}

// Links
const link = g.append("g").selectAll("line").data(validLinks).join("line")
    .attr("stroke", d => d.type==="related"?"rgba(99,102,241,0.12)":"rgba(255,255,255,0.03)")
    .attr("stroke-width", d => d.type==="related"?Math.min((d.weight||1)*0.4,2.5):0.5);

// Nodes
const node = g.append("g").selectAll("g").data(nodes).join("g")
    .call(d3.drag().on("start",ds).on("drag",dd).on("end",de));

node.append("circle")
    .attr("r", d => getR(d))
    .attr("fill", d => colors[d.type])
    .attr("opacity", d => d.type==="article"?0.9:0.6)
    .attr("stroke", d => colors[d.type])
    .attr("stroke-width", 0.5)
    .attr("stroke-opacity", 0.3);

// Glow for articles
node.filter(d => d.type==="article").append("circle")
    .attr("r", d => getR(d)+4)
    .attr("fill", "none")
    .attr("stroke", d => colors[d.type])
    .attr("stroke-width", 0.5)
    .attr("stroke-opacity", 0.15);

// Labels (only for entities and topics with connections)
const labelNodes = nodes.filter(d => d.type==="entity" || d.type==="topic" || d.type==="person");
node.filter(d => labelNodes.includes(d)).append("text")
    .text(d => d.label.length>18 ? d.label.slice(0,16)+"…" : d.label)
    .attr("x", d => getR(d)+4)
    .attr("y", 3)
    .attr("fill", d => colors[d.type])
    .attr("opacity", 0.5)
    .attr("font-size", d => d.type==="entity" && (d.freq||1)>2 ? "9px" : "7px")
    .attr("font-family", "'JetBrains Mono', monospace")
    .attr("font-weight", d => (d.freq||1)>2?"600":"400");

// Tooltip
const tooltip = document.getElementById("tooltip");
node.on("mouseover", (e,d) => {
    const conns = validLinks.filter(l => l.source.id===d.id || l.target.id===d.id);
    const connected = conns.map(l => l.source.id===d.id ? l.target : l.source);
    
    let typeLabel = {article:"Matéria",entity:"Entidade",topic:"Tópico",person:"Pessoa"}[d.type];
    let meta = d.date ? `${d.source} · ${d.date}/2026` : `Mencionado em ${conns.length} matérias`;
    let title = d.full_title || d.label;
    
    let connHtml = "";
    if(connected.length) {
        const grouped = {};
        connected.forEach(c => {
            if(!grouped[c.type]) grouped[c.type]=[];
            grouped[c.type].push(c.label);
        });
        connHtml = '<div class="tt-conn">';
        for(const [t,items] of Object.entries(grouped)) {
            const tl = {article:"Matérias",entity:"Entidades",topic:"Tópicos",person:"Pessoas"}[t];
            connHtml += `<div style="margin-bottom:3px"><span style="color:${colors[t]};font-family:var(--m);font-size:8px;text-transform:uppercase">${tl}</span><br>${items.slice(0,5).join(", ")}</div>`;
        }
        connHtml += '</div>';
    }
    
    tooltip.innerHTML = `<div class="tt-type" style="color:${colors[d.type]}">${typeLabel}</div><div class="tt-title">${title}</div><div class="tt-meta">${meta}</div>${connHtml}`;
    tooltip.classList.add("show");
    tooltip.style.left = (e.pageX+16)+"px";
    tooltip.style.top = (e.pageY-10)+"px";
    
    // Highlight connected
    node.select("circle").attr("opacity", n => n===d || connected.includes(n) ? 1 : 0.08);
    node.selectAll("text").attr("opacity", n => n===d || connected.includes(n) ? 0.9 : 0.05);
    link.attr("stroke-opacity", l => l.source===d || l.target===d ? 0.6 : 0.02);
})
.on("mousemove", e => {
    tooltip.style.left = (e.pageX+16)+"px";
    tooltip.style.top = (e.pageY-10)+"px";
})
.on("mouseout", () => {
    tooltip.classList.remove("show");
    node.select("circle").attr("opacity", d => d.type==="article"?0.9:0.6);
    node.selectAll("text").attr("opacity", 0.5);
    link.attr("stroke-opacity", 1);
    link.attr("stroke", d => d.type==="related"?"rgba(99,102,241,0.12)":"rgba(255,255,255,0.03)");
});

sim.on("tick", () => {
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("transform",d=>`translate(${d.x},${d.y})`);
});

function ds(e,d){ if(!e.active)sim.alphaTarget(0.3).restart(); d.fx=d.x;d.fy=d.y; }
function dd(e,d){ d.fx=e.x;d.fy=e.y; }
function de(e,d){ if(!e.active)sim.alphaTarget(0); d.fx=null;d.fy=null; }

// Filter
window.filterType = function(type, btn) {
    document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(!type) {
        node.attr("display","block");
        link.attr("display","block");
    } else {
        node.attr("display", d => d.type===type || validLinks.some(l => 
            (l.source.id===d.id && l.target.type===type) || 
            (l.target.id===d.id && l.source.type===type) ||
            (l.source.type===type && l.target.id===d.id) ||
            (l.target.type===type && l.source.id===d.id)
        ) ? "block" : "none");
        link.attr("display", l => l.source.type===type || l.target.type===type ? "block" : "none");
    }
};
