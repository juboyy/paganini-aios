name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
      - name: Custom secret detection
        run: python3 scripts/security/detect-secrets.py

  pii-scan:
    name: PII Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for PII
        run: python3 scripts/security/detect-pii.py

  corpus-leak:
    name: Corpus Leak Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for corpus content in code
        run: python3 scripts/security/detect-corpus.py

  gitignore-audit:
    name: Gitignore Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify gitignore rules
        run: python3 scripts/security/verify-gitignore.py

  sast:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and run Bandit
        run: |
          pip install bandit
          bandit -r packages/ -ll --skip B101,B603,B404 || true
