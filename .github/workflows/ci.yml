name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install "ruff>=0.15,<0.16" "black>=24.0,<27" "isort>=5.0,<9"
      - run: ruff check packages/ core/
      - run: black --check --target-version py312 packages/ core/
      - run: isort --check --profile black packages/ core/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          extra_args: --only-verified
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]" 2>/dev/null || pip install pytest
      - run: pytest tests/ -v --tb=short -x --timeout=60
        env:
          PAGANINI_TEST: "1"

  sast:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit p/python
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  eval-rag:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]" 2>/dev/null || pip install pytest
      - run: |
          echo "RAG eval dataset: $(wc -l < packs/finance/eval_questions.jsonl) Q&A pairs"
          python3 -c "
          import json
          with open('packs/finance/eval_questions.jsonl') as f:
              pairs = [json.loads(l) for l in f if l.strip()]
          print(f'Categories: {len(set(p[\"category\"] for p in pairs))}')
          print(f'With sources: {sum(1 for p in pairs if p.get(\"sources\"))}')
          print('Eval dataset validated ✓')
          "
