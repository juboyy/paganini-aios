# PAGANINI AIOS Configuration
version: "0.1.0"

# Runtime engine
runtime:
  engine: python
  moltis_config: moltis.yaml
  gateway_url: http://127.0.0.1:30000

# LLM Provider (BYOK — you keep your keys)
provider:
  type: google
  model: gemini/gemini-2.5-flash
  api_key: ""
  base_url: ""

# RAG Pipeline (tunable by AutoResearch)
rag:
  chunk_size: 384
  chunk_overlap: 64
  respect_headers: true
  top_k: 5
  max_context_tokens: 8000

# MetaClaw (skill evolution proxy)
metaclaw:
  enabled: false
  skills_dir: skills/
  auto_evolve: true
  max_skills: 500
  proxy_url: ""

# Guardrails (6-gate hard-stop pipeline)
guardrails:
  eligibility: true
  concentration: true
  covenant: true
  pld_aml: true
  compliance: true
  risk_assessment: true

# Data paths
data_dir: runtime/data
corpus_dir: data/corpus/fidc/
pack: fidc
