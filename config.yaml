## PAGANINI AIOS — Production Config
## Connects kernel to self-hosted Qwen3.5-27B on Modal

version: "0.2.0"

provider:
  type: openai   # OpenAI-compatible API
  model: qwen3.5-27b-q4km
  api_key: "not-needed"  # Modal endpoint is public (auth via URL)
  base_url: https://juboyy--paganini-27b-gguf-inference-v1-chat-completions.modal.run

# Routing: queries simples → 7B, complexas → 27B
routing:
  enabled: true
  models:
    simple:
      model: qwen2.5-7b
      base_url: https://juboyy--paganini-vllm-inference-generate.modal.run
    complex:
      model: qwen3.5-27b-q4km
      base_url: https://juboyy--paganini-27b-gguf-inference-v1-chat-completions.modal.run
  # CognitiveRouter thresholds
  complexity_threshold: moderate  # moderate+ goes to 27B

metaclaw:
  enabled: false
  proxy_url: ""

rag:
  chunk_size: 384
  chunk_overlap: 64
  respect_headers: true
  top_k: 8
  max_context_tokens: 16000

runtime:
  engine: python    # python | docker | moltis
  moltis_config: moltis.yaml
  gateway_url: http://127.0.0.1:30000

data_dir: runtime/data
corpus_dir: runtime/corpus
