  - parecer
  - ata
  - contrato
  - suplemento
  - prospecto
  - termo
  - relatorio
  - comunicado
  - politica
  - laudo

# Patterns used to detect each doc type from filename + text snippet.
# Each pattern is a case-insensitive substring / regex fragment.
doc_type_patterns:
