# ---------------------------------------------------------------------------
# Entity types for GraphRAG NER (graph_rag.py)
# ---------------------------------------------------------------------------
# Each key becomes an entity type constant.
# Values are regex pattern strings (Python re syntax, case-insensitive applied).

entity_types:
  FUNDO:
    - 'FIDC\s+[\w\s\-\.]+?(?=\s*[,;:\|\n]|$)'
    - 'FUNDO\s+(?:DE\s+)?INVEST\w+\s+[\w\s\-\.]+?(?=\s*[,;:\|\n]|$)'
    - 'FII\s+[\w\s\-\.]+?(?=\s*[,;:\|\n]|$)'
    - 'FICFIDC\s+[\w\s\-\.]+?(?=\s*[,;:\|\n]|$)'
  REGULACAO:
    - 'Instru[çc][ãa]o CVM\s*n[°º.]?\s*\d+'
    - 'Resolu[çc][ãa]o\s+(?:CMN|CVM|BACEN)\s*n[°º.]?\s*\d+'
    - 'Circular BACEN\s*n[°º.]?\s*\d+'
    - 'Lei\s+(?:Federal\s+)?n[°º.]?\s*[\d\.]+(?:/\d{4})?'
    - 'ICVM[\s-]?\d+'
  CEDENTE:
    - 'cedente[s]?\s+[\w\s\-\.]+?(?=\s*[,;:\|\n]|$)'
    - 'originador\s+[\w\s\-\.]+?(?=\s*[,;:\|\n]|$)'
  COTISTA:
    - 'cotista[s]?\s+[\w\s\-\.]+?(?=\s*[,;:\|\n]|$)'
    - 'investidor\s+(?:qualificado|profissional|institucional)\s+[\w\s\-\.]+?(?=\s*[,;:\|\n]|$)'
  INDICADOR:
    - '\b(?:CDI|IPCA|IGP-M|SELIC|DI|TJLP|TR|INPC)\b'
    - '\bCDI[+\-]\s*[\d,\.]+%'
    - '\bIPCA[+\-]\s*[\d,\.]+%'
  AGENTE:
    - '(?:Administrador|Gestora?|Custodiante|Auditor|Agente\s+Fiduci[aá]rio|Coordenador\s+L[ií]der|Distribuidora|Estruturador)\s+(?:[A-Z][A-Za-z\s]+?(?:\s+(?:S\.A\.|DTVM|CTVM|Ltda\.?))?)'
