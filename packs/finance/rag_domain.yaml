# FIDC Domain Configuration for Paganini RAG
# Pack: packs/finance
#
# This file contains ALL domain-specific knowledge previously hardcoded in the
# six core RAG modules.  Editing this file is the ONLY place to change FIDC
# vocabulary — the modules themselves are now domain-agnostic.

name: fidc
language: pt-BR

