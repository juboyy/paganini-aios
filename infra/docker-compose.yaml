version: "3.8"

services:
  paganini:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: paganini-aios
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ../data:/opt/paganini-aios/data
      - ../runtime:/opt/paganini-aios/runtime
      - ../.env:/opt/paganini-aios/.env:ro
    ports:
      - "8000:8000"
    networks:
      - paganini

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: paganini-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: paganini
      POSTGRES_USER: paganini
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - paganini

volumes:
  pgdata:

networks:
  paganini:
    driver: bridge
