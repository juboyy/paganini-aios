# infra/security/egress-allowlist.conf
# PAGANINI AIOS — Egress Proxy (nginx)
# ONLY whitelisted domains can be reached from paganini-external network.
# All other traffic: 403 Forbidden + logged.

# --- Upstream definitions ---

# LLM Providers (BYOK — client's own keys)
upstream openai_api    { server api.openai.com:443; }
upstream anthropic_api { server api.anthropic.com:443; }
upstream google_api    { server generativelanguage.googleapis.com:443; }
upstream ollama_local  { server host.docker.internal:11434; }

# Regulatory Sources (read-only scraping)
upstream cvm           { server www.gov.br:443; }
upstream anbima        { server www.anbima.com.br:443; }
upstream bacen         { server www.bcb.gov.br:443; }

# Due Diligence Sources
upstream serasa        { server www.serasa.com.br:443; }
upstream receita       { server www.receita.fazenda.gov.br:443; }
upstream tjsp          { server esaj.tjsp.jus.br:443; }

# Communication
upstream slack_api     { server slack.com:443; }

# --- Proxy server ---

server {
    listen 8443 ssl;

    # TLS termination (self-signed for internal proxy)
    ssl_certificate     /etc/nginx/certs/proxy.crt;
    ssl_certificate_key /etc/nginx/certs/proxy.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Access log for audit trail
    access_log /var/log/nginx/egress-access.log;
    error_log  /var/log/nginx/egress-error.log warn;

    # --- Allowed routes ---

    # LLM Providers
    location /proxy/openai/ {
        proxy_pass https://openai_api/;
        proxy_ssl_verify on;
        proxy_set_header Host api.openai.com;
    }
    location /proxy/anthropic/ {
        proxy_pass https://anthropic_api/;
        proxy_ssl_verify on;
        proxy_set_header Host api.anthropic.com;
    }
    location /proxy/google/ {
        proxy_pass https://google_api/;
        proxy_ssl_verify on;
        proxy_set_header Host generativelanguage.googleapis.com;
    }

    # Regulatory
    location /proxy/cvm/ {
        proxy_pass https://cvm/;
        proxy_ssl_verify on;
        proxy_set_header Host www.gov.br;
        limit_req zone=regulatory burst=5 nodelay;
    }
    location /proxy/anbima/ {
        proxy_pass https://anbima/;
        proxy_ssl_verify on;
        proxy_set_header Host www.anbima.com.br;
        limit_req zone=regulatory burst=5 nodelay;
    }
    location /proxy/bacen/ {
        proxy_pass https://bacen/;
        proxy_ssl_verify on;
        proxy_set_header Host www.bcb.gov.br;
        limit_req zone=regulatory burst=5 nodelay;
    }

    # Due Diligence
    location /proxy/serasa/ {
        proxy_pass https://serasa/;
        proxy_ssl_verify on;
        proxy_set_header Host www.serasa.com.br;
    }
    location /proxy/receita/ {
        proxy_pass https://receita/;
        proxy_ssl_verify on;
        proxy_set_header Host www.receita.fazenda.gov.br;
    }

    # Slack
    location /proxy/slack/ {
        proxy_pass https://slack_api/;
        proxy_ssl_verify on;
        proxy_set_header Host slack.com;
    }

    # --- DEFAULT: BLOCK EVERYTHING ELSE ---
    location / {
        access_log /var/log/nginx/blocked.log;
        return 403 '{"error":"domain_not_in_allowlist","message":"Egress blocked by PAGANINI security policy"}';
        add_header Content-Type application/json;
    }
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=regulatory:10m rate=10r/m;
