apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-core
  labels:
    app: paganini
    component: core
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: paganini
      component: core
  template:
    metadata:
      labels:
        app: paganini
        component: core
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: paganini
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          env:
            - name: PAGANINI_PROVIDER
              value: {{ .Values.provider.name }}
            - name: PAGANINI_MODEL
              value: {{ .Values.provider.model }}
            - name: PAGANINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: api-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: corpus
              mountPath: {{ .Values.corpus.path }}
              readOnly: true
            - name: data
              mountPath: /app/runtime/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: corpus
          {{- if .Values.corpus.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-corpus
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: data
          emptyDir: {}
