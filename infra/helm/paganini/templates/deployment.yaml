apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paganini.fullname" . }}
  labels:
    {{- include "paganini.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "paganini.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        {{- include "paganini.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: core
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.runAsUser }}
      containers:
        - name: paganini
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          command: ["paganini", "dashboard", "--host", "0.0.0.0", "--port", "{{ .Values.service.port }}"]
          env:
            - name: PAGANINI_PROVIDER
              value: {{ .Values.provider.name | quote }}
            - name: PAGANINI_MODEL
              value: {{ .Values.provider.model | quote }}
            - name: PAGANINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "paganini.fullname" . }}-secrets
                  key: api-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: corpus
              mountPath: /opt/paganini/data/corpus
              readOnly: true
            - name: runtime
              mountPath: /opt/paganini/runtime
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: corpus
          {{- if .Values.corpus.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "paganini.fullname" . }}-corpus
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: runtime
          emptyDir: {}
