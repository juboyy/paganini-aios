apiVersion: v1
kind: Service
metadata:
  name: {{ include "paganini.fullname" . }}
  labels:
    {{- include "paganini.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "paganini.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: core
