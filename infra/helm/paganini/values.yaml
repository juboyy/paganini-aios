# PAGANINI AIOS — Helm Values
# Override with: helm install paganini ./infra/helm/paganini --set provider.apiKey=sk-...

replicaCount: 1

image:
  repository: ghcr.io/juboyy/paganini-aios
  tag: "0.1.0-slim"
  pullPolicy: IfNotPresent

provider:
  name: openai
  model: gpt-4o-mini
  apiKey: ""  # REQUIRED: --set provider.apiKey=<your-key>

moltis:
  enabled: true
  port: 30000

corpus:
  path: /opt/paganini/data/corpus
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: ""

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  host: paganini.example.com
  annotations: {}
  tls: []

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true

daemons:
  enabled: true
  schedule: "*/15 * * * *"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 80
